<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelômetro CCT - Distribuição Normal</title>
    <!-- Chart.js para o gráfico estatístico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ff9800; margin-bottom: 5px; }
        p.subtitle { color: #888; margin-top: 0; font-size: 0.9em; margin-bottom: 20px; }
        
        /* BANNER DE STATUS */
        .status-banner {
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2em;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }
        .status-disponivel { background-color: rgba(76, 175, 80, 0.2); color: #81c784; border: 1px solid #4CAF50; }
        .status-esgotado { background-color: rgba(244, 67, 54, 0.2); color: #e57373; border: 1px solid #f44336; }

        /* BOTÕES */
        .btn-acao {
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin: 10px 0 25px 0;
            width: 100%;
        }
        .btn-pronto {
            background-color: #ff9800;
            color: #121212;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }
        .btn-pronto:hover { background-color: #e65100; }
        .btn-acabou {
            background-color: #f44336;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
            display: none; /* Escondido por padrão */
        }
        .btn-acabou:hover { background-color: #d32f2f; }
        .btn-acao:active { transform: scale(0.98); }
        .btn-acao:disabled { background-color: #555; color: #888; cursor: not-allowed; box-shadow: none; }
        
        .stats-box {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background-color: #252525;
            padding: 15px 10px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stat-label { color: #aaa; font-size: 0.85em; margin-bottom: 5px; }
        .stat-val { font-size: 1.3em; font-weight: bold; color: #ffb74d; }
        
        .chart-container {
            position: relative;
            width: 100%;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #loading { color: #ff9800; display: none; margin-top: -15px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥐 Pastelômetro CCT</h1>
    <p class="subtitle">Análise Preditiva de Salgados da Cantina</p>

    <!-- ÁREA DE STATUS E AÇÕES -->
    <div id="status-banner" class="status-banner"></div>
    <button id="btn-pronto" class="btn-acao btn-pronto" onclick="acionarAPI('registrar_pronto')">Pastel Pronto! 🔔</button>
    <button id="btn-acabou" class="btn-acao btn-acabou" onclick="acionarAPI('registrar_acabou')">O Pastel Acabou ❌</button>
    
    <div id="loading">A sincronizar com a Cantina...</div>

    <div class="stats-box">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Média (<span style="font-family: serif; font-size: 1.2em;">μ</span>)</div>
                <div id="val-mu" class="stat-val">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Mediana</div>
                <div id="val-mediana" class="stat-val">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Moda</div>
                <div id="val-moda" class="stat-val">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DP Pop. (<span style="font-family: serif; font-size: 1.2em;">σ</span>)</div>
                <div id="val-sigma" class="stat-val">- min</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DP Amostra (<span style="font-family: serif; font-size: 1.2em;">s</span>)</div>
                <div id="val-s" class="stat-val">- min</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Amostras (n)</div>
                <div id="val-total" class="stat-val">0</div>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="gaussChart"></canvas>
    </div>
</div>

<script>
    // ⚠️ SUBSTITUA PELO URL COPIADO DO SEU GOOGLE APPS SCRIPT ATUALIZADO
    const API_URL = "https://script.google.com/macros/s/AKfycbwQEP1QPSZ5SrKzPRqw5k-yDI4Junq0_Bx5KUe4Ry94VOjlNslWWx4aB2dEpdRFOBXA/exec";
    
    let chart;

    // --- LÓGICA DE INTERFACE E STATUS ---
    function atualizarInterfaceDeStatus(status, hora) {
        const btnPronto = document.getElementById('btn-pronto');
        const btnAcabou = document.getElementById('btn-acabou');
        const banner = document.getElementById('status-banner');

        if (status === "aguardando") {
            btnPronto.style.display = "block";
            btnAcabou.style.display = "none";
            banner.style.display = "none";
        } else if (status === "disponivel") {
            btnPronto.style.display = "none";
            btnAcabou.style.display = "block";
            banner.style.display = "block";
            banner.className = "status-banner status-disponivel";
            banner.innerHTML = `🔥 Pastel saiu às <strong>${hora}</strong>! Corre!`;
        } else if (status === "esgotado") {
            btnPronto.style.display = "none";
            btnAcabou.style.display = "none";
            banner.style.display = "block";
            banner.className = "status-banner status-esgotado";
            banner.innerHTML = `🛑 O pastel de hoje já acabou. Volte amanhã!`;
        }
    }

    // Converte minutos acumulados do dia de volta para o formato HH:MM
    function minutosParaHora(minutos) {
        if (minutos === undefined || minutos === null || isNaN(minutos)) return "--:--";
        let h = Math.floor(minutos / 60);
        let m = Math.floor(minutos % 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    // Funções Estatísticas
    function calcularEstatisticas(array) {
        if (!array || array.length === 0) return null;
        let n = array.length;
        
        let soma = array.reduce((a, b) => a + b, 0);
        let mu = soma / n;

        let ordenado = [...array].sort((a, b) => a - b);
        let mediana = n % 2 === 0 
            ? (ordenado[n/2 - 1] + ordenado[n/2]) / 2 
            : ordenado[Math.floor(n/2)];

        let freq = {};
        let maxFreq = 0;
        array.forEach(v => {
            freq[v] = (freq[v] || 0) + 1;
            if (freq[v] > maxFreq) maxFreq = freq[v];
        });
        
        let modaStr = "--:--";
        if (maxFreq > 1) {
            let modas = Object.keys(freq).filter(k => freq[k] === maxFreq).map(Number);
            modaStr = modas.map(m => minutosParaHora(m)).join(' e ');
        } else {
            modaStr = "Amodal";
        }

        let varianciaPop = array.reduce((a, b) => a + Math.pow(b - mu, 2), 0) / n;
        let sigma = Math.sqrt(varianciaPop);
        
        let varianciaAmostral = n > 1 ? array.reduce((a, b) => a + Math.pow(b - mu, 2), 0) / (n - 1) : 0;
        let s = Math.sqrt(varianciaAmostral);

        return { mu, mediana, modaStr, sigma, s, total: n };
    }

    function funcaoNormal(x, mu, sigma) {
        let expoente = -Math.pow(x - mu, 2) / (2 * Math.pow(sigma, 2));
        return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(expoente);
    }

    function gerarPontosCurva(mu, sigma) {
        let pontos = [];
        let sigmaGrafico = (!sigma || sigma === 0) ? 1 : sigma; 
        let margem = Math.max(3 * sigmaGrafico, 60); 
        let inicio = mu - margem;
        let fim = mu + margem;
        let passo = (fim - inicio) / 200;

        for (let x = inicio; x <= fim; x += passo) {
            pontos.push({ x: x, y: funcaoNormal(x, mu, sigmaGrafico) });
        }
        return pontos;
    }

    // Atualiza toda a Dashboard com o novo formato de payload da API
    function atualizarDashboardCompleto(respostaAPI) {
        if (!respostaAPI || !respostaAPI.historico) return;

        // 1. Atualiza Status e Botões
        atualizarInterfaceDeStatus(respostaAPI.statusHoje, respostaAPI.horaPronto);

        // 2. Atualiza Estatísticas e Gráfico
        let dadosEstatisticos = calcularEstatisticas(respostaAPI.historico);
        if (!dadosEstatisticos) return;

        document.getElementById('val-mu').innerText = `${minutosParaHora(dadosEstatisticos.mu)}`;
        document.getElementById('val-mediana').innerText = dadosEstatisticos.mediana ? minutosParaHora(dadosEstatisticos.mediana) : '--:--';
        document.getElementById('val-moda').innerText = dadosEstatisticos.modaStr || '--:--';
        document.getElementById('val-sigma').innerText = dadosEstatisticos.sigma ? `${dadosEstatisticos.sigma.toFixed(1)} min` : '- min';
        document.getElementById('val-s').innerText = dadosEstatisticos.s ? `${dadosEstatisticos.s.toFixed(1)} min` : '- min';
        document.getElementById('val-total').innerText = dadosEstatisticos.total;

        const pontosCurva = gerarPontosCurva(dadosEstatisticos.mu, dadosEstatisticos.sigma);
        const ctx = document.getElementById('gaussChart').getContext('2d');

        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(255, 152, 0, 0.6)');
        gradient.addColorStop(1, 'rgba(255, 152, 0, 0.0)');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Densidade de Probabilidade',
                    data: pontosCurva,
                    borderColor: '#ff9800',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'linear',
                        title: { display: true, text: 'Horário Previsto', color: '#888', font: { size: 14 } },
                        ticks: {
                            color: '#aaa',
                            maxTicksLimit: 8,
                            callback: function(value) { return minutosParaHora(value); }
                        },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    y: { display: false, min: 0 }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleColor: '#ff9800',
                        callbacks: {
                            title: function(context) { return 'Hora: ' + minutosParaHora(context[0].parsed.x); },
                            label: function(context) { return 'Probabilidade: ' + (context.parsed.y * 100).toFixed(2) + '%'; }
                        }
                    }
                }
            }
        });
    }

    // Faz consultas silenciosas para carregar dados
    async function carregarDados() {
        try {
            let res = await fetch(`${API_URL}?action=consultar`);
            let respostaAPI = await res.json(); 
            atualizarDashboardCompleto(respostaAPI);
        } catch (err) {
            console.error("Erro ao conectar à API, exibindo fallback local.", err);
            // Fallback simulado para preview se a API falhar
            atualizarDashboardCompleto({
                historico: [1025, 976, 1045, 1031, 1019, 1047, 1044, 1042, 1024],
                statusHoje: "aguardando",
                horaPronto: ""
            });
        }
    }

    // Lida com cliques nos dois botões ("Pronto" ou "Acabou")
    async function acionarAPI(acao) {
        const btnPronto = document.getElementById('btn-pronto');
        const btnAcabou = document.getElementById('btn-acabou');
        const loading = document.getElementById('loading');
        
        btnPronto.disabled = true;
        btnAcabou.disabled = true;
        loading.style.display = 'block';

        try {
            let res = await fetch(`${API_URL}?action=${acao}`);
            let respostaAPI = await res.json(); 
            
            atualizarDashboardCompleto(respostaAPI);
        } catch (err) {
            alert("Erro ao comunicar com o servidor. Tente novamente.");
            // Simulação puramente visual para o Preview do Editor:
            if (acao === 'registrar_pronto') {
                atualizarDashboardCompleto({
                    historico: [1025, 976, 1045, 1031, 1019, 1047, 1044, 1042, 1024, 1020],
                    statusHoje: "disponivel",
                    horaPronto: "17:00"
                });
            } else {
                atualizarDashboardCompleto({
                    historico: [1025, 976, 1045, 1031, 1019, 1047, 1044, 1042, 1024, 1020],
                    statusHoje: "esgotado",
                    horaPronto: "17:00"
                });
            }
        } finally {
            btnPronto.disabled = false;
            btnAcabou.disabled = false;
            loading.style.display = 'none';
        }
    }

    window.onload = carregarDados;
</script>

</body>
</html>
